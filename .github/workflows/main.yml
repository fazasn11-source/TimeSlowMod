name: Build Time Slow Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Клонируем репозиторий (версия v3 - актуальна)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Шаг 2: Устанавливаем Java 8
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin' # 'adopt' больше не поддерживается, используем 'temurin'

      # Шаг 3: Даем права на выполнение gradlew
      - name: Make gradlew executable
        run: chmod +x gradlew

      # Шаг 4: Собираем мод
      - name: Build with Gradle
        run: ./gradlew build

      # Шаг 5: Загружаем результат (ОБНОВЛЕНО ДО v4)
      - name: Upload built JAR
        uses: actions/upload-artifact@v4  # Было v2, стало v4
        with:
          name: timeslowmod
          path: build/libs/timeslowmod-*.jar
          # Рекомендуется для v4: сжатие артефакта
          compression-level: 6

  # Создание релиза при пуше в main
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Шаг 1: Скачиваем артефакт (ОБНОВЛЕНО ДО v4)
      - name: Download built JAR
        uses: actions/download-artifact@v4  # Было v2, стало v4
        with:
          name: timeslowmod
          path: ./

      # Шаг 2: Создаем релиз (create-release пока не требует обновления, но учти, что он тоже может устареть)
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Автоматическая сборка Time Slow Mod

            ## Изменения:
            - Последний коммит: ${{ github.event.head_commit.message }}
            - Автор: ${{ github.event.head_commit.author.name }}

            ## Установка:
            1. Скачай JAR файл ниже
            2. Положи в папку mods
            3. Играй с Forge 1.16.5
          draft: false
          prerelease: false

      # Шаг 3: Загружаем в релиз (upload-release-asset тоже надо проверить, но он пока работает)
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./timeslowmod-1.0.0.jar
          asset_name: timeslowmod-1.0.0.jar
          asset_content_type: application/java-archive
